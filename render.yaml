services:
  - type: web
    name: grocery-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        scope: project
      - key: DB_USER
        scope: project
      - key: DB_PASSWORD
        scope: project
      - key: DB_NAME
        scope: project
      - key: JWT_SECRET
        scope: project
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: DB_CONNECTION_LIMIT
        value: 10
      - key: ALLOWED_ORIGINS
        value: https://grocery-home.vercel.app
